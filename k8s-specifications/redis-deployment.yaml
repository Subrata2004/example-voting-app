apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
  name: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
      - name: redis
        image: redis:alpine

        ports:
        - containerPort: 6379
          name: redis

        volumeMounts:
        - mountPath: /data
          name: redis-data

        # Readiness Probe
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3

        # Liveness Probe
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3

        # Resource Requests & Limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

      volumes:
      - name: redis-data
        emptyDir: {}
