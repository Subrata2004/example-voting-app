name: Vote Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "vote/**"
      - "k8s-specifications/**"
      - ".github/workflows/vote-ci.yml"

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  vote-ci:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r vote/requirements.txt
          pip install flake8 yamllint

      - name: Lint Vote Application
        run: |
          flake8 vote --max-line-length=120

      - name: Lint Kubernetes Manifests
        run: |
          yamllint k8s-specifications/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/${{ github.repository_owner }}/example-voting-app-vote:${{ github.sha }} \
          ./vote

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/example-voting-app-vote:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create Kind Cluster
        uses: helm/kind-action@v1

      - name: Create PostgreSQL Secret
        run: |
          kubectl apply -f k8s-specifications/db-secret.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f k8s-specifications/

      - name: Wait for Pods
        run: |
          kubectl wait --for=condition=Ready pods --all --timeout=300s

      - name: Port Forward Vote Service
        run: |
          kubectl port-forward svc/vote 8080:8080 &
          sleep 15

      - name: Smoke Test
        run: |
          curl --fail http://localhost:8080