name: Vote Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "vote/**"
      - "k8s-specifications/**"
      - ".github/workflows/vote-ci.yml"
      - ".yamllint.yml"

  pull_request:
    branches:
      - main
    paths:
      - "vote/**"
      - "k8s-specifications/**"
      - ".github/workflows/vote-ci.yml"
      - ".yamllint.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/subrata2004/example-voting-app-vote
  IMAGE_TAG: ${{ github.sha }}

jobs:
  vote-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install -r vote/requirements.txt
          pip install flake8 yamllint

      - name: Lint Vote Application
        run: flake8 vote --max-line-length=120

      - name: Lint Kubernetes Manifests
        run: yamllint k8s-specifications/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ./vote

      - name: Push Docker Image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Create Kind Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Load Image into Kind Cluster
        run: |
          kind load docker-image \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --name kind

      - name: Create PostgreSQL Secret
        run: kubectl apply -f k8s-specifications/db-secret.yaml

      - name: Deploy Application
        run: |
          kubectl apply -f k8s-specifications/db-service.yaml
          kubectl apply -f k8s-specifications/db-statefulset.yaml
          kubectl apply -f k8s-specifications/redis-service.yaml
          kubectl apply -f k8s-specifications/redis-deployment.yaml
          kubectl apply -f k8s-specifications/result-service.yaml
          kubectl apply -f k8s-specifications/result-deployment.yaml
          kubectl apply -f k8s-specifications/worker-deployment.yaml
          kubectl apply -f k8s-specifications/vote-service.yaml
          kubectl apply -f k8s-specifications/vote-deployment.yaml

      - name: Set Vote Deployment Image
        run: |
          kubectl set image deployment/vote \
            vote=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Wait for Pods
        run: kubectl wait --for=condition=Ready pods --all --timeout=300s

      - name: Port Forward Vote Service
        run: |
          kubectl port-forward svc/vote 8080:8080 &
          sleep 15

      - name: Smoke Test
        run: curl --fail --retry 5 --retry-delay 3 http://localhost:8080
